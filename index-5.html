<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大きな筆談ボード</title>
<style>
  :root{
    --bg:#E9EEEC; --surface:#FFFFFF; --ink:#16201E; --muted:#5C6B68;
    --line:#D5DEDB; --accent:#1F7A6B; --accent-soft:#DCEDE9; --warn:#D64541; --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",Meiryo,system-ui,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden; -webkit-text-size-adjust:100%;
  }

  header{ flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:8px 14px; }
  .brand{ font-size:1rem; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:8px; }
  .brand::before{ content:""; width:10px; height:20px; border-radius:3px; background:var(--accent); }
  .icon-btn{
    margin-left:auto; border:1px solid var(--line); background:var(--surface); color:var(--ink);
    min-width:46px; height:44px; border-radius:11px; font-size:1.05rem; font-weight:700; cursor:pointer; line-height:1;
  }
  .icon-btn[aria-pressed="true"]{ background:var(--accent); color:#fff; border-color:var(--accent); }

  /* small preview (compose view) */
  .board{
    flex:1 1 auto; min-height:70px; margin:2px 14px 0;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    display:flex; align-items:center; justify-content:center; padding:14px; overflow:hidden; cursor:pointer;
  }
  #message{ width:100%; font-weight:700; line-height:1.2; text-align:center; word-break:break-word; white-space:pre-wrap; }
  #message.placeholder{ color:var(--muted); font-weight:500; font-size:clamp(1rem,4vw,1.35rem) !important; }
  .tap-hint{ flex:0 0 auto; text-align:center; font-size:.75rem; color:var(--muted); margin:4px 0 0; }

  .rotate-tip{ flex:0 0 auto; margin:6px 14px 0; padding:10px 12px; background:var(--accent-soft);
    color:var(--accent); border:1px solid var(--accent); border-radius:12px; font-size:1rem; font-weight:700; text-align:center; line-height:1.4; }
  .rotate-tip small{ display:block; font-weight:500; color:var(--ink); font-size:.82rem; line-height:1.5; margin-top:3px; }
  @media (orientation:landscape){ .rotate-tip{ display:none; } }
  body.hc .rotate-tip small{ color:#16201E; }

  .quick-sub{ flex:0 0 auto; font-size:.78rem; color:var(--muted); padding:3px 14px 0; }
  body.hc .quick-sub{ color:#9aa; }

  .quick-head{ flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:8px 14px 0; }
  .quick-head .qh-label{ font-size:.85rem; color:var(--muted); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
  .quick-head button{ flex:0 0 auto; }
  .quick-head button{ margin-left:auto; border:1px solid var(--line); background:var(--surface); color:var(--accent);
    height:34px; padding:0 14px; border-radius:10px; font-weight:700; font-size:.9rem; cursor:pointer; }
  .quick{ flex:0 0 auto; display:flex; gap:8px; overflow-x:auto; padding:8px 14px 2px; -webkit-overflow-scrolling:touch; }
  .quick::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; border:1px solid var(--accent); background:var(--accent-soft); color:var(--accent);
    border-radius:999px; height:44px; padding:0 18px; font-size:1.05rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .chip:active{ transform:scale(.97); }

  .controls{ flex:0 0 auto; padding:8px 14px 0; }
  #input{ width:100%; resize:none; border:1px solid var(--line); border-radius:14px; padding:12px;
    font-size:1.2rem; line-height:1.4; font-family:inherit; color:var(--ink); background:var(--surface); height:54px; }
  #input:focus{ outline:3px solid var(--accent-soft); border-color:var(--accent); }
  .actions{ display:flex; gap:8px; margin-top:8px; }
  .btn{ height:56px; border-radius:14px; border:none; cursor:pointer; font-size:1.1rem; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn:active{ transform:scale(.98); }
  .btn-show{ flex:1.4; background:var(--accent); color:#fff; }
  .btn-speak{ flex:1; background:var(--surface); color:var(--ink); border:1px solid var(--line); }
  .btn-clear{ flex:0 0 84px; background:var(--surface); color:var(--warn); border:1px solid var(--line); }
  .note{ font-size:.8rem; color:var(--muted); text-align:center; margin:6px 2px 0; min-height:1em; }

  /* ad slot */
  .adwrap{ flex:0 0 auto; padding:6px 14px calc(8px + env(safe-area-inset-bottom)); }
  .ad-label{ font-size:.7rem; color:var(--muted); text-align:center; margin-bottom:2px; }
  .adbox{ min-height:56px; display:flex; align-items:center; justify-content:center;
    border:1px dashed var(--line); border-radius:12px; color:var(--muted); font-size:.85rem; text-align:center; padding:6px; }

  @media (max-height:470px){
    body{ height:auto; min-height:100dvh; overflow-y:auto; }
    .board{ flex:0 0 auto; height:80px; min-height:0; margin-top:4px; }
    .quick-head{ padding-top:6px; } .quick{ padding-top:6px; }
    .chip{ height:40px; } #input{ height:42px; } .controls{ padding-top:6px; }
    .btn{ height:46px; } .adwrap{ padding-top:4px; } .adbox{ min-height:48px; }
  }

  /* high contrast */
  body.hc{ --bg:#000; }
  body.hc .board{ background:#000; border-color:#444; }
  body.hc #message{ color:#fff; }
  body.hc .brand{ color:#7ee0cf; } body.hc .brand::before{ background:#7ee0cf; }
  body.hc .icon-btn{ background:#111; color:#fff; border-color:#555; }
  body.hc .chip{ background:#10302b; color:#8fe6d6; border-color:#3aa491; }
  body.hc .quick-head span,body.hc .tap-hint,body.hc .ad-label,body.hc .adbox{ color:#9aa; }
  body.hc #input{ background:#111; color:#fff; border-color:#555; }
  body.hc .btn-speak,body.hc .btn-clear{ background:#111; border-color:#555; }
  body.hc .btn-speak{ color:#fff; } body.hc .adbox{ border-color:#555; }

  /* fullscreen present view */
  .present{ position:fixed; inset:0; background:var(--surface); display:none; z-index:30; }
  .present.open{ display:flex; align-items:center; justify-content:center; }
  .present #present-msg{ width:100%; font-weight:700; line-height:1.2; text-align:center; word-break:break-word; white-space:pre-wrap; padding:14px; }
  .present-close{ position:absolute; top:12px; right:12px; width:52px; height:52px; border-radius:50%;
    border:1px solid var(--line); background:var(--surface); color:var(--ink); font-size:1.3rem; font-weight:700; cursor:pointer; z-index:31; }
  body.hc .present{ background:#000; } body.hc .present #present-msg{ color:#fff; }
  body.hc .present-close{ background:#111; color:#fff; border-color:#555; }

  /* edit overlay */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; padding:16px; z-index:40; }
  .overlay.open{ display:flex; }
  .panel{ background:var(--surface); color:var(--ink); border-radius:18px; width:100%; max-width:480px; max-height:88vh; display:flex; flex-direction:column; }
  .panel h2{ font-size:1.05rem; margin:0; padding:14px 16px; border-bottom:1px solid var(--line); }
  .panel .list{ overflow:auto; padding:12px 16px; flex:1 1 auto; }
  .erow{ display:flex; gap:8px; margin-bottom:8px; }
  .erow input{ flex:1; border:1px solid var(--line); border-radius:10px; padding:11px; font-size:1.05rem; font-family:inherit; }
  .erow .del{ width:46px; border:1px solid var(--line); background:var(--surface); color:var(--warn); border-radius:10px; font-size:1.1rem; font-weight:700; cursor:pointer; }
  .add-btn{ width:100%; border:1px dashed var(--accent); background:var(--accent-soft); color:var(--accent); border-radius:10px; padding:11px; font-weight:700; cursor:pointer; }
  .panel-foot{ display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line); }
  .panel-foot button{ height:48px; border-radius:12px; font-weight:700; cursor:pointer; border:none; }
  .save{ flex:1; background:var(--accent); color:#fff; }
  .cancel{ flex:1; background:var(--surface); color:var(--ink); border:1px solid var(--line); }
  .reset{ background:var(--surface); color:var(--warn); border:1px solid var(--line); padding:0 12px; }
</style>
</head>
<body>
  <header>
    <div class="brand">大きな筆談ボード</div>
    <button class="icon-btn" id="contrast" aria-pressed="false" aria-label="白黒反転">◐</button>
  </header>

  <div class="rotate-tip">
    📱 スマホは「横向き」がおすすめです
    <small>端末を横に倒すと、文字がぐっと大きく・読みやすく表示されます。回らないときは、画面の自動回転をオン（iPhoneは回転ロックを解除）にしてください。</small>
  </div>

  <main class="board" id="board">
    <div id="message" class="placeholder">文字を入力して「表示」を押すと、画面いっぱいに大きく出ます</div>
  </main>

  <div class="quick-head"><span class="qh-label">よく使う言葉　→「✎ 編集」で変更できます</span><button id="editBtn">✎ 編集</button></div>
  <div class="quick" id="quick"></div>

  <div class="controls">
    <textarea id="input" placeholder="ここに文字を入力…" autocomplete="off"></textarea>
    <div class="actions">
      <button class="btn btn-show" id="show">表示</button>
      <button class="btn btn-speak" id="speak">🔊 読み上げ</button>
      <button class="btn btn-clear" id="clear">消す</button>
    </div>
    <div class="note" id="note"></div>
  </div>

  <div class="adwrap">
    <div class="ad-label">広告</div>
    <div class="adbox" id="adbox">
      <!-- admax -->
      <script src="https://adm.shinobi.jp/s/f3bc65449bffd6e4f338619f55cdab0d"></script>
      <!-- admax -->
    </div>
  </div>

  <!-- 見せる画面（全画面） -->
  <div class="present" id="present">
    <button class="present-close" id="presentClose" aria-label="閉じる">✕</button>
    <div id="present-msg"></div>
  </div>

  <!-- 編集パネル -->
  <div class="overlay" id="overlay">
    <div class="panel">
      <h2>よく使う言葉を編集</h2>
      <div class="list" id="editList"></div>
      <div style="padding:0 16px 12px;"><button class="add-btn" id="addRow">＋ 追加</button></div>
      <div class="panel-foot">
        <button class="reset" id="resetBtn">初期に戻す</button>
        <button class="cancel" id="cancelBtn">キャンセル</button>
        <button class="save" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

<script>
(function(){
  var board=document.getElementById('board'), message=document.getElementById('message');
  var input=document.getElementById('input'), note=document.getElementById('note'), quick=document.getElementById('quick');
  var present=document.getElementById('present'), presentMsg=document.getElementById('present-msg');
  var PLACEHOLDER='文字を入力して「表示」を押すと、画面いっぱいに大きく出ます';
  var KEY='hitsudan_phrases_v1';
  var DEFAULTS=['はい','いいえ','ありがとう','痛いです','トイレに行きたい','お水をください',
                'もう一度お願いします','ゆっくり話してください','大丈夫です','少し待ってください'];

  function loadPhrases(){ try{var s=localStorage.getItem(KEY); if(s){return JSON.parse(s);}}catch(e){} return DEFAULTS.slice(); }
  function savePhrases(a){ try{localStorage.setItem(KEY,JSON.stringify(a));}catch(e){ note.textContent='この環境では保存できません（公開後のサイトでは保存されます）。'; } }
  var phrases=loadPhrases();

  // fit text as large as possible inside a box (no clipping).
  // For longer text, cap the size so each line holds ~3+ characters
  // (prevents the 1-2 chars-per-line wrapping that happens in portrait).
  function fit(box, el, min, max){
    var n=(el.textContent||'').replace(/\s/g,'').length;
    var cap = n<=3 ? max : Math.max(min, Math.floor(box.clientWidth/3.2));
    var hi=Math.min(max,cap), lo=min, best=min;
    while(lo<=hi){
      var mid=(lo+hi)>>1; el.style.fontSize=mid+'px';
      if(el.scrollHeight<=box.clientHeight && el.scrollWidth<=box.clientWidth){ best=mid; lo=mid+1; } else { hi=mid-1; }
    }
    el.style.fontSize=best+'px';
  }

  // compose preview (small, live)
  function preview(){
    var t=input.value.trim();
    if(t){ message.textContent=input.value; message.classList.remove('placeholder'); fit(board,message,16,120); }
    else { message.textContent=PLACEHOLDER; message.classList.add('placeholder'); }
  }
  input.addEventListener('input', preview);

  // fullscreen present
  function openPresent(text){
    text=(text||'').trim(); if(!text){ return; }
    presentMsg.textContent=text; present.classList.add('open'); input.blur();
    try{ if(document.documentElement.requestFullscreen && !document.fullscreenElement){ document.documentElement.requestFullscreen(); } }catch(e){}
    requestAnimationFrame(function(){ fit(present,presentMsg,28,360); });
  }
  function closePresent(){
    present.classList.remove('open');
    try{ if(document.fullscreenElement){ document.exitFullscreen(); } }catch(e){}
  }
  document.getElementById('presentClose').addEventListener('click', closePresent);
  presentMsg.addEventListener('click', closePresent);

  document.getElementById('show').addEventListener('click', function(){ note.textContent=''; openPresent(input.value); });
  board.addEventListener('click', function(){ openPresent(input.value); });
  document.getElementById('clear').addEventListener('click', function(){ input.value=''; preview(); input.focus(); });

  document.getElementById('speak').addEventListener('click', function(){
    var t=input.value.trim(); if(!t){ return; }
    openPresent(t);
    if(!('speechSynthesis' in window)){ return; }
    speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.95; speechSynthesis.speak(u);
  });

  // chips
  function renderChips(){
    quick.innerHTML='';
    phrases.forEach(function(p){
      var b=document.createElement('button'); b.className='chip'; b.type='button'; b.textContent=p;
      b.addEventListener('click', function(){ input.value=p; preview(); openPresent(p); });
      quick.appendChild(b);
    });
  }
  renderChips();

  // contrast
  var cb=document.getElementById('contrast');
  cb.addEventListener('click', function(){ var on=document.body.classList.toggle('hc'); cb.setAttribute('aria-pressed', on?'true':'false'); });

  // edit panel
  var overlay=document.getElementById('overlay'), editList=document.getElementById('editList');
  function buildRows(arr){ editList.innerHTML=''; arr.forEach(function(p){ addRow(p); }); }
  function addRow(v){
    var row=document.createElement('div'); row.className='erow';
    var i=document.createElement('input'); i.type='text'; i.value=v||''; i.placeholder='言葉を入力';
    var d=document.createElement('button'); d.className='del'; d.type='button'; d.textContent='✕';
    d.addEventListener('click', function(){ row.remove(); });
    row.appendChild(i); row.appendChild(d); editList.appendChild(row);
  }
  document.getElementById('editBtn').addEventListener('click', function(){ buildRows(phrases); overlay.classList.add('open'); });
  document.getElementById('addRow').addEventListener('click', function(){ addRow(''); });
  document.getElementById('cancelBtn').addEventListener('click', function(){ overlay.classList.remove('open'); });
  document.getElementById('resetBtn').addEventListener('click', function(){ buildRows(DEFAULTS); });
  document.getElementById('saveBtn').addEventListener('click', function(){
    var vals=[]; editList.querySelectorAll('input').forEach(function(i){ var v=i.value.trim(); if(v){ vals.push(v); } });
    phrases=vals; savePhrases(phrases); renderChips(); overlay.classList.remove('open');
  });
  overlay.addEventListener('click', function(e){ if(e.target===overlay){ overlay.classList.remove('open'); } });

  // re-fit on resize / rotate
  window.addEventListener('resize', function(){
    if(present.classList.contains('open')){ fit(present,presentMsg,28,360); } else { preview(); }
  });

  preview();
})();
</script>
</body>
</html>
